<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px"
	 viewBox="0 0 500 100" style="enable-background:new 0 0 500 100;" xml:space="preserve">
<defs>
  <!-- Elegant gold gradient -->
  <linearGradient id="elegantGold" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#FFD700"/>
    <stop offset="20%" style="stop-color:#FFF8DC"/>
    <stop offset="40%" style="stop-color:#FFD700"/>
    <stop offset="60%" style="stop-color:#DAA520"/>
    <stop offset="80%" style="stop-color:#FFD700"/>
    <stop offset="100%" style="stop-color:#B8860B"/>
  </linearGradient>
  
  <!-- Shimmer animation gradient -->
  <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#FFD700"/>
    <stop offset="50%" style="stop-color:#FFFACD"/>
    <stop offset="100%" style="stop-color:#FFD700"/>
    <animate attributeName="x1" values="-100%;100%" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="0%;200%" dur="4s" repeatCount="indefinite"/>
  </linearGradient>
  
  <!-- Glow filter -->
  <filter id="softGlow" x="-10%" y="-10%" width="120%" height="120%">
    <feGaussianBlur stdDeviation="1.5" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  
  <!-- Drop shadow -->
  <filter id="dropShadow" x="-5%" y="-5%" width="110%" height="110%">
    <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-color="#000" flood-opacity="0.4"/>
  </filter>
</defs>

<!-- Decorative trumpet icon -->
<g transform="translate(10, 20)" filter="url(#softGlow)">
  <!-- Simplified elegant trumpet -->
  <path d="M5,30 Q0,30 0,25 L0,25 Q0,20 5,20 L5,15 Q15,15 15,25 Q15,35 5,35 Z" fill="url(#elegantGold)"/>
  <rect x="15" y="22" width="25" height="6" fill="url(#elegantGold)" rx="1"/>
  <circle cx="50" cy="25" r="8" fill="none" stroke="url(#elegantGold)" stroke-width="2"/>
</g>

<!-- Main text with elegant styling -->
<text x="260" y="45" text-anchor="middle" font-family="'Playfair Display', Georgia, 'Times New Roman', serif" font-size="42" font-weight="700" letter-spacing="6" fill="url(#elegantGold)" filter="url(#dropShadow)">
  TRUMPETER
</text>

<!-- Elegant decorative line with flourish -->
<g stroke="url(#elegantGold)" fill="none" stroke-width="1.5">
  <path d="M100,58 Q150,65 200,58 Q250,52 300,58 Q350,65 400,58" opacity="0.8"/>
  <circle cx="250" cy="58" r="3" fill="url(#elegantGold)"/>
</g>

<!-- TV text with stylish spacing -->
<text x="260" y="85" text-anchor="middle" font-family="'Playfair Display', Georgia, 'Times New Roman', serif" font-size="32" font-weight="700" letter-spacing="20" fill="url(#elegantGold)" filter="url(#dropShadow)">
  TV
</text>

<!-- Elegant corner flourishes -->
<g fill="url(#elegantGold)" opacity="0.5">
  <path d="M30,10 Q40,5 50,10 Q45,15 40,10 Q35,5 30,10"/>
  <path d="M470,10 Q460,5 450,10 Q455,15 460,10 Q465,5 470,10"/>
</g>

</svg>