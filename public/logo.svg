<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px"
	 viewBox="0 0 400 120" style="enable-background:new 0 0 400 120;" xml:space="preserve">
<defs>
  <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#FFD700"/>
    <stop offset="25%" style="stop-color:#FFF8DC"/>
    <stop offset="50%" style="stop-color:#FFD700"/>
    <stop offset="75%" style="stop-color:#DAA520"/>
    <stop offset="100%" style="stop-color:#FFD700"/>
  </linearGradient>
  
  <linearGradient id="shimmerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#FFD700">
      <animate attributeName="offset" values="-1;1" dur="3s" repeatCount="indefinite"/>
    </stop>
    <stop offset="50%" style="stop-color:#FFFACD">
      <animate attributeName="offset" values="-0.5;1.5" dur="3s" repeatCount="indefinite"/>
    </stop>
    <stop offset="100%" style="stop-color:#FFD700">
      <animate attributeName="offset" values="0;2" dur="3s" repeatCount="indefinite"/>
    </stop>
  </linearGradient>
  
  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
    <feMerge>
      <feMergeNode in="coloredBlur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
  </filter>
</defs>

<!-- Background rounded rectangle -->
<rect x="5" y="5" width="390" height="110" rx="15" ry="15" fill="#1a1a2e" stroke="url(#goldGradient)" stroke-width="2"/>

<!-- Trumpet Icon on the left -->
<g transform="translate(25, 35)" filter="url(#glow)">
  <!-- Trumpet bell -->
  <ellipse cx="8" cy="25" rx="12" ry="20" fill="url(#goldGradient)" opacity="0.9"/>
  <ellipse cx="8" cy="25" rx="8" ry="16" fill="#1a1a2e"/>
  
  <!-- Trumpet body -->
  <rect x="15" y="22" width="35" height="6" fill="url(#goldGradient)" rx="1"/>
  
  <!-- Trumpet valves -->
  <rect x="25" y="10" width="5" height="14" fill="url(#goldGradient)" rx="1"/>
  <rect x="33" y="8" width="5" height="16" fill="url(#goldGradient)" rx="1"/>
  <rect x="41" y="10" width="5" height="14" fill="url(#goldGradient)" rx="1"/>
  
  <!-- Mouthpiece -->
  <rect x="50" y="23" width="12" height="4" fill="url(#goldGradient)" rx="2"/>
  <ellipse cx="65" cy="25" rx="4" ry="5" fill="url(#goldGradient)"/>
</g>

<!-- Main Text: TRUMPETER -->
<text x="200" y="58" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="bold" letter-spacing="4" fill="url(#goldGradient)" filter="url(#shadow)">
  TRUMPETER
</text>

<!-- Decorative line under TRUMPETER -->
<line x1="100" y1="68" x2="300" y2="68" stroke="url(#goldGradient)" stroke-width="1.5" opacity="0.7"/>

<!-- TV text -->
<text x="200" y="98" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="bold" letter-spacing="12" fill="url(#goldGradient)" filter="url(#shadow)">
  T V
</text>

<!-- Decorative dots -->
<circle cx="165" cy="88" r="2" fill="#FFD700" opacity="0.8">
  <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
</circle>
<circle cx="235" cy="88" r="2" fill="#FFD700" opacity="0.8">
  <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" begin="0.5s"/>
</circle>

<!-- Small decorative stars -->
<g fill="#FFD700" opacity="0.6">
  <polygon points="95,30 97,35 102,35 98,38 100,43 95,40 90,43 92,38 88,35 93,35">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="305,30 307,35 312,35 308,38 310,43 305,40 300,43 302,38 298,35 303,35">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite" begin="1s"/>
  </polygon>
</g>

</svg>